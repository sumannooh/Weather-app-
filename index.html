<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌦 Weather App</h1>

<div class="search-box">

<input
type="text"
id="city"
placeholder="Enter City Name">

<button onclick="getWeather()">
Search
</button>

</div>

<div class="weather-card">

<h2 id="cityName">
City Name
</h2>

<img
id="icon"
src=""
alt="Weather Icon">

<h1 id="temp">
--°C
</h1>

<p id="condition">
Weather Condition
</p>

<p>
💧 Humidity :
<span id="humidity">
--
</span>%
</p>

<p>
💨 Wind Speed :
<span id="wind">
--
</span>
km/h
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
